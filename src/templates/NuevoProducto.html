{% extends "layout.html" %}

  {% block content %}
    
    <form>
        <div class="form-row">
          <div class="container mt-2 text-left"></div>
        <h2 class=text-success>Nuevo Producto</h2>
    </div>
          <div class="form-group col-md-6">
            <label for="code">Codigo</label>
            <input type="text" class="form-control" id="code" placeholder="Inserte el código del producto (dato único)">
          </div>
          <div class="form-group col-md-6">
            <label for="descripcion">Descripción:</label>
            <input type="text" class="form-control" id="descripcion" placeholder="Describa el producto (dato único)">
          </div>
          

          <div class="form-group col-md-6">
            <label for="cantidad_inventario">Cantidad Inventario</label>
            <input type="number" class="form-control" id="cantidad_inventario" placeholder="Stock actual del producto (dato único)">
          </div>
          <div class="form-group col-md-6">
            <label for="precio_unitario">Precio Unitario</label>
            <input type="number" class="form-control" id="precio_unitario" placeholder="Ingrese el valor por unidad (dato único)">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group col-md-4">
            <label for="unidad_medida">Unidad de Medida</label>
            <select id="unidad_medida" class="form-control">
              <option selected>Por favor seleccione...</option>
              <option value="GRS">GRS</option>
              <option value="UND">UND</option>
            </select>
          </div>
          <div class="form-group col-md-4">
            <label for="categoria">Categoria</label>
            <select id="categoria" class="form-control">
              <option selected>Por favor seleccione...</option>
              <option value="1">Alimentos</option>
              <option value="2">Ropa</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Guardar</button>
    </form>  
  </body>
</html>

{% endblock %}
