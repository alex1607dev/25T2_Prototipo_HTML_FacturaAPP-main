{% extends "layout.html" %}

  {% block content %}

  <form>
    <div class="container mt-2 text-left"></div>
        <h2 class=text-success>Nuevo Cliente</h2>
    </div>
        <div class="card mb-4 bg-primary text-white"</div>
            <div class="card-header bg-primary text-white">
                Datos del Nuevo Cliente
            </div>
    <div class="form-row">
      <div class="form-group col-md-6">
        
        <label for="fullName">Nombre Completo</label>
        <input type="text" class="form-control" id="fullName" placeholder="Nombre completo">
      </div>
      <div class="form-group col-md-6">
        <label for="birthDate">Fecha de Nacimiento</label>
        <input type="date" class="form-control" id="birthDate" placeholder="Fecha de Nacimiento">
      </div>

    <div class="form-row">  
    </div>
    <div class="form-group col-md-6">
      <label for="documentNumber">Cedula Ciudadania</label>
      <input type="text" class="form-control" id="documentNumber" placeholder="0000011111">
    
    </div>
    <div class="form-group col-md-6">
      <label for="phoneNumber">Telefono</label>
      <input type="text" class="form-control" id="phoneNumber" placeholder="0000022222">
    </div>
    
    <div class="form-row">
    </div>
    <div class="form-group col-md-6">
      <label for="inputAddress">Direccion</label>
      <input type="text" class="form-control" id="inputAddress" placeholder="Cra. Transversal ">
    </div>
    <div class="form-row">
      <div class="form-group col-md-6">
        <label for="inputCity">Ciudad</label>
        <input type="text" class="form-control" id="inputCity" placeholder="Bogotá, Medellin, Cali, Cartagena"> 
      </div>
      <div class="form-group col-md-4">
        <label for="inputState">State</label>
        <select id="inputState" class="form-control">
          <option selected>Choose...</option>
          <option>...</option>
        </select>
      </div>
      <div class="form-group col-md-2">
        <label for="inputZip">Zip</label>
        <input type="text" class="form-control" id="inputZip">
      </div>

    </div>
    <div class="form-group">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="gridCheck">
        <label class="form-check-label" for="gridCheck">
          Check me out
        </label>
      </div>
    </div>
    <div class="container">
              <button type="submit" class="btn btn-success">Crear</button>
            </div> 
    </form>
  </body>
</html>

{% endblock %}
